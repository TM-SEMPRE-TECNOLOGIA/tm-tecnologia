<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            width: 24px;
            height: 24px;
            border: 2px solid white;
            position: absolute;
        }

            border: 4px solid #C8541C;
        }
        .camera-overlay-bg {
            background-color: black;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-black text-white h-screen overflow-hidden flex flex-col font-body-md">
<!-- Top Bar -->
<header class="flex justify-center items-center h-16 px-container-margin z-10">
<div class="flex items-center gap-2 bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span class="font-label-mono text-label-mono text-white">📷 Câmera traseira</span>
</div>
</header>
<!-- Camera Viewfinder Section -->
<main class="flex-1 flex items-center justify-center relative px-container-margin overflow-hidden">
<!-- The actual 4:3 view container -->
<div class="relative w-full aspect-[3/4] max-w-md bg-zinc-900 rounded-lg shadow-2xl overflow-hidden flex items-center justify-center border border-white/5">
<!-- Mock Camera Feed Image -->
<img alt="Camera feed showing a construction site structural column" class="w-full h-full object-cover opacity-80" data-alt="A cinematic, high-detail photograph of a concrete structural column at a construction site, captured during the golden hour. The lighting is warm and directional, highlighting the rough texture of the concrete and the steel rebar reinforcements. The scene is shot from a technical perspective, consistent with an architectural inspection. The overall color palette features warm creams, burnt oranges, and industrial greys, maintaining a modern tactile professional aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAfnYGB5W_o4dicFWG09hRHMt5AS-0JxFTIXTWXUywxPL6wL0Jc6jJYmPfwKqaeGY7-MXFP6tRsRUo8gUF2JN14B08iAY3TRgBfdamjaMbN7nde8YVuySA8W3tUGlmVC0zlIt8sUiDDJ18xpUAIvocOiH1fL8PHsnd1EiwsPEFqMB0zHJFYSu2DAk3t9DTjnm0U4QH5ArO1tu78AuvDf3zHJQJFAhNFIZC1dNHtuZ6KLHAbBOchIVJRYLJG-TLdf6PCLzzlCG1-6cw"/>
<!-- Viewfinder Corners -->
<div class="viewfinder-corner top-4 left-4 border-r-0 border-b-0"></div>
<div class="viewfinder-corner top-4 right-4 border-l-0 border-b-0"></div>
<div class="viewfinder-corner bottom-4 left-4 border-r-0 border-t-0"></div>
<div class="viewfinder-corner bottom-4 right-4 border-l-0 border-t-0"></div>
<!-- Focus Square (Interaction Decorative) -->
<div class="absolute w-20 h-20 border border-primary/60 rounded-sm flex items-center justify-center animate-pulse">
<div class="w-1 h-1 bg-primary rounded-full"></div>
</div>
</div>
</main>
<!-- Controls Bar -->
<footer class="h-40 px-container-margin flex items-center justify-between z-10">
<!-- Cancel Button -->
<button class="flex-1 flex justify-start items-center group transition-transform active:scale-95">
<span class="font-button text-button text-white uppercase tracking-wider">Cancelar</span>
</button>
<!-- Shutter Button -->
<div class="flex-none flex items-center justify-center px-8">
<button class="relative flex items-center justify-center group active:scale-90 transition-transform duration-200">
<!-- External Ring -->
<div class="absolute w-20 h-20 rounded-full shutter-ring"></div>
<!-- Shutter Circle -->
<div class="w-14 h-14 bg-white rounded-full transition-all group-hover:scale-95"></div>
</button>
</div>
<!-- Flip Camera Button -->
<div class="flex-1 flex justify-end items-center">
<button class="w-12 h-12 flex items-center justify-center bg-white/10 rounded-full hover:bg-white/20 active:scale-95 transition-all">
<span class="material-symbols-outlined text-white text-2xl">flip_camera_ios</span>
</button>
</div>
</footer>
<!-- Hidden Grid Overlay for visual density/precision feel -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] overflow-hidden">
<div class="w-full h-full" style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 40px 40px;"></div>
</div>
<!-- UI Flash Interaction Script -->
<script>
        document.querySelector('.shutter-ring').parentElement.addEventListener('click', function() {
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-white z-[100] pointer-events-none';
            document.body.appendChild(flash);
            
            let opacity = 1;
            const fade = setInterval(() => {
                opacity -= 0.1;
                if (opacity <= 0) {
                    clearInterval(fade);
                    flash.remove();
                } else {
                    flash.style.opacity = opacity;
                }
            }, 30);
        });
    </script>
</body></html>
