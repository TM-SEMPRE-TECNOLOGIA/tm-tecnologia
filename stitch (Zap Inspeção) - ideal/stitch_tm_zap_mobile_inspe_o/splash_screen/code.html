<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.98); }
        }

        .animate-brand-pulse {
            animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface flex items-center justify-center min-h-screen overflow-hidden">
<!-- Splash Container -->
<main class="flex flex-col items-center justify-center w-full max-w-md px-container-margin">
<!-- Brand Identity Icon -->
<div class="animate-brand-pulse mb-6" id="brand-logo-container">
<!-- Representing the Brand Icon: Orange square with rounded corners and white chat bubble -->
<div class="w-24 h-24 bg-[#C8541C] rounded-xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-white text-6xl" data-icon="chat" style="font-variation-settings: 'FILL' 1;">
                    chat
                </span>
</div>
</div>
<!-- Brand Name -->
<h1 class="font-headline-md text-headline-md text-[#C8541C] mb-8 tracking-tight">
            TM·Zap Inspeção
        </h1>
<!-- Loading Text with JetBrains Mono -->
<div class="flex flex-col items-center gap-4">
<p class="font-label-mono text-label-mono text-secondary uppercase tracking-[0.2em] loading-dots">
                CARREGANDO
            </p>
<!-- Technical Loading Progress Bar (Structural signifier) -->
<div class="w-32 h-[2px] bg-border-base overflow-hidden rounded-full">
<div class="h-full bg-primary transition-all duration-300 ease-out" id="progress-bar" style="width: 0%"></div>
</div>
</div>
</main>
<!-- Background Pattern (Subtle Architectural Texture) -->
<div class="fixed inset-0 pointer-events-none opacity-5">
<div class="absolute inset-0" style="background-image: radial-gradient(#DAD7D0 1px, transparent 1px); background-size: 24px 24px;"></div>
</div>
<script>
        // Micro-interaction for loading progress simulation
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            let progress = 0;
            
            const simulateLoading = () => {
                if (progress < 100) {
                    // Start slow, speed up, then slow down at the end for "human" feel
                    let increment = progress < 30 ? 0.5 : progress < 70 ? 1.5 : 0.2;
                    progress += increment;
                    if (progress > 100) progress = 100;
                    progressBar.style.width = `${progress}%`;
                    requestAnimationFrame(simulateLoading);
                }
            };
            
            // Artificial delay to show the "clean" state before movement
            setTimeout(() => {
                requestAnimationFrame(simulateLoading);
            }, 500);
        });
    </script>
</body></html>
