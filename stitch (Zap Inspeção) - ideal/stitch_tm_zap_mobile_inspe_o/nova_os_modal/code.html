<body class="bg-background font-body-md text-on-surface min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Background Content Mockup (Behind Modal) -->
<div class="w-full max-w-md h-screen relative bg-surface-container-low flex flex-col p-container-margin opacity-40 select-none">
<header class="flex justify-between items-center mb-6">
<h1 class="font-headline-md text-headline-md text-primary">TM·Zap Inspeção</h1>
<span class="material-symbols-outlined text-secondary">notifications</span>
</header>
<div class="space-y-stack-gap">
<div class="bg-white border border-border-base p-card-padding flex items-center justify-between">
<div>
<p class="font-label-mono text-label-mono text-ink-subtle uppercase">Inspeção #042</p>
<p class="font-headline-sm text-headline-sm">Lambari — MG</p>
</div>
<span class="material-symbols-outlined text-primary">arrow_forward_ios</span>
</div>
<div class="bg-white border border-border-base p-card-padding opacity-50">

<p class="font-headline-sm text-headline-sm">Pouso Alegre — MG</p>
</div>
</div>
</div>
<!-- Modal Overlay -->

<!-- Bottom Sheet Modal -->
<div class="fixed bottom-0 left-0 right-0 z-50 flex justify-center translate-y-0 transition-transform duration-500 ease-out" id="bottom-sheet">
<div class="w-full max-w-md bg-background rounded-t-[16px] shadow-2xl overflow-hidden flex flex-col max-h-[795px]">
<!-- Handle Bar -->
<div class="w-full flex justify-center py-3">
<div class="w-12 h-1.5 bg-border-base rounded-full"></div>
</div>
<!-- Modal Content -->
<div class="px-container-margin pb-container-margin overflow-y-auto">
<!-- Header -->
<header class="mb-6">
<h2 class="font-headline-sm text-headline-sm text-primary">Nova OS — Levantamento</h2>
</header>
<!-- Form -->
<form class="space-y-6">
<!-- Dropdown Select -->
<div class="flex flex-col gap-baseline">
<label class="font-label-mono text-label-mono text-secondary uppercase" for="contrato">Contrato</label>
<div class="relative group">
<select class="w-full appearance-none bg-surface-card border border-border-base rounded px-4 py-3 font-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="contrato">
<option selected="" value="lambari">LAMBARI · Lambari — MG</option>
<option value="pouso">POUSO ALEGRE · Pouso Alegre — MG</option>
<option value="itaja">ITAJUBÁ · Itajubá — MG</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-secondary">expand_more</span>
</div>
</div>
<!-- Input Cidade -->
<div class="flex flex-col gap-baseline">
<label class="font-label-mono text-label-mono text-secondary uppercase" for="cidade">Cidade</label>
<input class="w-full bg-surface-card border border-border-base rounded px-4 py-3 font-body-md text-on-surface placeholder:text-ink-subtle focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="cidade" placeholder="Lambari" type="text"/>
</div>
<!-- Input Técnico -->
<div class="flex flex-col gap-baseline">
<label class="font-label-mono text-label-mono text-secondary uppercase" for="tecnico">Nome do Técnico</label>
<input class="w-full bg-surface-card border border-border-base rounded px-4 py-3 font-body-md text-on-surface placeholder:text-ink-subtle focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="tecnico" placeholder="Thiago" type="text"/>
</div>
<!-- Technical Illustration Area (Decorative/Informative) -->
<div class="mt-4 p-card-padding bg-surface-container-low border border-border-base rounded relative overflow-hidden h-24 flex items-center justify-center">
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#DAD7D0 1px, transparent 1px); background-size: 8px 8px;"></div>
<div class="z-10 flex items-center gap-3 text-ink-subtle">
<span class="material-symbols-outlined text-[32px]">assignment_turned_in</span>
<p class="font-label-mono text-[10px] leading-tight">INSPEÇÃO TÉCNICA<br/>MODALIDADE: LEVANTAMENTO<br/>GEO-SYNC: ATIVO</p>
</div>
</div>
</form>
</div>
<!-- Sticky Footer for Actions -->
<div class="p-container-margin bg-background border-t border-border-base">
<!-- Submit Button (Disabled State) -->
<button class="w-full py-4 bg-primary-container/40 text-on-primary-container font-button text-button rounded-xl cursor-not-allowed flex items-center justify-center gap-2 transition-all active:scale-[0.98]" disabled="">
                    Criar OS e Abrir Chat
                    <span class="material-symbols-outlined text-[18px]">forum</span>
</button>
<p class="text-center mt-3 font-label-mono text-[10px] text-ink-subtle uppercase">Preencha todos os campos para continuar</p>
</div>
</div>
</div>
<!-- JavaScript for micro-interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input, select');
            const submitBtn = document.querySelector('button[disabled]');
            
            const checkForm = () => {
                let allFilled = true;
                inputs.forEach(input => {
                    if (input.value.trim() === '') allFilled = false;
                });
                
                if (allFilled) {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('bg-primary-container/40', 'cursor-not-allowed');
                    submitBtn.classList.add('bg-primary-container', 'hover:bg-primary-container/90', 'shadow-md');
                } else {
                    submitBtn.disabled = true;
                    submitBtn.classList.add('bg-primary-container/40', 'cursor-not-allowed');
                    submitBtn.classList.remove('bg-primary-container', 'hover:bg-primary-container/90', 'shadow-md');
                }
            };

            inputs.forEach(input => {
                input.addEventListener('input', checkForm);
                input.addEventListener('change', checkForm);
            });

            // Initial check in case browser auto-fills
            checkForm();

            // Simple drag down to close simulation
            let startY = 0;
            const sheet = document.getElementById('bottom-sheet');
            
            sheet.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
            });

            sheet.addEventListener('touchmove', (e) => {
                const currentY = e.touches[0].clientY;
                const diff = currentY - startY;
                if (diff > 0) {
                    sheet.style.transform = `translateY(${diff}px)`;
                }
            });

            sheet.addEventListener('touchend', (e) => {
                const currentY = e.changedTouches[0].clientY;
                if (currentY - startY > 150) {
                    sheet.style.transform = 'translateY(100%)';
                    setTimeout(() => {
                        sheet.style.transform = 'translateY(0)'; // Reset for demo purposes
                    }, 2000);
                } else {
                    sheet.style.transform = 'translateY(0)';
                }
            });
        });
    </script>
