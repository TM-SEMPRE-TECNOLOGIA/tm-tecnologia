<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code — Simulação de Inicialização</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --panel: #141414;
      --border: #222;
      --accent: #e87c2b;
      --accent-dim: #a85a18;
      --green: #22c55e;
      --blue: #3b82f6;
      --yellow: #eab308;
      --red: #ef4444;
      --purple: #a855f7;
      --text: #e5e5e5;
      --muted: #555;
      --muted2: #888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 14px; color: #000;
    }

    header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
    header p { font-size: 12px; color: var(--muted2); margin-top: 1px; }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      flex: 1;
    }

    /* ── LEFT: input area ── */
    .left {
      border-right: 1px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 4px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, background .15s;
    }

    .example-btn:hover {
      border-color: var(--accent);
      background: #1a1208;
    }

    .example-btn.active {
      border-color: var(--accent);
      background: #1a1208;
    }

    .example-btn .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .tag-nova { background: #1a3a1a; color: var(--green); }
    .tag-bug  { background: #3a1a1a; color: var(--red); }
    .tag-ask  { background: #1a1a3a; color: var(--blue); }
    .tag-sess { background: #2a1a3a; color: var(--purple); }

    .custom-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 10px 14px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color .15s;
    }

    textarea:focus { border-color: var(--accent); }

    button.run-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 20px;
      cursor: pointer;
      transition: background .15s;
      align-self: flex-start;
    }

    button.run-btn:hover { background: #f0922e; }
    button.run-btn:disabled { background: var(--muted); cursor: default; }

    /* ── RIGHT: visualization ── */
    .right {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .stage {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .3s ease, transform .3s ease, border-color .3s;
      position: relative;
    }

    .stage.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .stage.active {
      border-color: var(--accent);
    }

    .stage.done {
      border-color: #333;
    }

    .stage-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .stage-icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .stage-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .stage-status {
      margin-left: auto;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .status-wait { background: #222; color: var(--muted2); }
    .status-run  { background: #1a2a1a; color: var(--green); }
    .status-done { background: #1a2216; color: #44bb66; }
    .status-skip { background: #1a1a1a; color: var(--muted); }

    .stage-body {
      font-size: 12px;
      color: var(--muted2);
      line-height: 1.6;
      display: none;
    }

    .stage.visible .stage-body { display: block; }

    .finding {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-top: 6px;
      padding: 6px 8px;
      background: #0d0d0d;
      border-radius: 6px;
      font-size: 11px;
      color: var(--muted2);
      border-left: 2px solid transparent;
    }

    .finding.ok   { border-color: var(--green); color: #aaa; }
    .finding.warn { border-color: var(--yellow); color: #aaa; }
    .finding.info { border-color: var(--blue); color: #aaa; }
    .finding.act  { border-color: var(--accent); color: #aaa; }

    .finding-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .ok .finding-dot   { background: var(--green); }
    .warn .finding-dot { background: var(--yellow); }
    .info .finding-dot { background: var(--blue); }
    .act .finding-dot  { background: var(--accent); }

    .output-box {
      margin-top: 12px;
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px;
      color: #ccc;
      line-height: 1.7;
      white-space: pre-wrap;
      display: none;
    }

    .output-box.visible { display: block; }

    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent);
      vertical-align: middle;
      animation: blink .8s step-end infinite;
      margin-left: 1px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 4px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .reset-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted2);
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    .reset-btn:hover { border-color: var(--muted2); color: var(--text); }

    .input-display {
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--accent);
      font-family: monospace;
      margin-bottom: 4px;
      display: none;
    }

    .decision-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      margin: 2px;
    }

    .dt-skill    { background: #2a1a3a; color: var(--purple); }
    .dt-code     { background: #1a2a1a; color: var(--green); }
    .dt-memory   { background: #1a1a3a; color: var(--blue); }
    .dt-ask      { background: #3a2a1a; color: var(--yellow); }
    .dt-agent    { background: #3a1a1a; color: var(--red); }

    footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 16px;
    }

    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; }
      .left { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">TM</div>
  <div>
    <h1>Claude Code — Simulação de Inicialização</h1>
    <p>Veja o que acontece nos bastidores quando você me diz qualquer coisa</p>
  </div>
</header>

<div class="main">

  <!-- LEFT -->
  <div class="left">
    <div>
      <div class="section-label">Exemplos rápidos</div>
      <div class="examples" id="examples">
        <button class="example-btn" data-type="nova" onclick="selectExample(this)">
          <span class="tag tag-nova">NOVA FEAT</span>
          "Quero adicionar uma tela de relatório no AutoRelatório V5"
        </button>
        <button class="example-btn" data-type="bug" onclick="selectExample(this)">
          <span class="tag tag-bug">BUG</span>
          "O contrato 1565 está gerando altura 10cm em vez de 7cm"
        </button>
        <button class="example-btn" data-type="ask" onclick="selectExample(this)">
          <span class="tag tag-ask">PERGUNTA</span>
          "Como funciona o conteudo[] no scanner?"
        </button>
        <button class="example-btn" data-type="sess" onclick="selectExample(this)">
          <span class="tag tag-sess">SESSÃO</span>
          "Tenho sessões inacabadas, quero continuar"
        </button>
      </div>
    </div>

    <div class="custom-area">
      <div class="section-label">Ou escreva o que quiser</div>
      <textarea id="custom-input" placeholder="Ex: quero criar um app de OS para o Banco do Brasil…"></textarea>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="run-btn" id="run-btn" onclick="runSimulation()">▶ Simular</button>
        <button class="reset-btn" onclick="reset()">Reiniciar</button>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right" id="right">
    <div class="section-label" style="color:#333">← Escolha um exemplo ou escreva algo</div>
  </div>

</div>

<footer>
  <span>TM Sempre Tecnologia</span>
  <span>·</span>
  <span>Claude Code — claude-sonnet-4-6</span>
  <span>·</span>
  <span>Simulação didática — não executa código real</span>
</footer>

<script>
  const STAGES = {
    nova: [
      {
        icon: '🧠', color: '#3b82f6', title: 'Ler MEMORY.md e memórias do projeto',
        status: 'Consultando',
        findings: [
          { type: 'ok', text: 'Memória carregada: project_autorelatoriov5.md' },
          { type: 'ok', text: 'Memória carregada: forense_autorelatorio_ecossistema.md' },
          { type: 'info', text: 'Projeto ativo: AutoRelatório V5 — FastAPI + Next.js' },
          { type: 'warn', text: 'Regra detectada: RN-07 — 1 contrato = 1 módulo isolado' },
        ]
      },
      {
        icon: '📋', color: '#a855f7', title: 'Identificar tipo de tarefa',
        status: 'Classificando',
        findings: [
          { type: 'act', text: 'Tipo: NOVA FEATURE — tela de relatório' },
          { type: 'info', text: 'Skill relevante: /brainstorming (obrigatório antes de implementar)' },
          { type: 'info', text: 'Stack: Next.js App Router + FastAPI' },
        ]
      },
      {
        icon: '📁', color: '#22c55e', title: 'Verificar estrutura existente',
        status: 'Lendo arquivos',
        findings: [
          { type: 'ok', text: 'AutoRelatorio_V5/frontend/app/ — encontrado' },
          { type: 'ok', text: 'AutoRelatorio_V5/backend/routes/ — encontrado' },
          { type: 'warn', text: '_workspace/automacoes/ — verificando duplicatas antes de criar' },
        ]
      },
      {
        icon: '💡', color: '#e87c2b', title: 'Decisão de abordagem',
        status: 'Decidindo',
        decisions: ['skill:brainstorming', 'code:new-route', 'memory:RN-07'],
        body: 'Vou rodar /brainstorming primeiro para alinhar a visão antes de codar — regra da metodologia TM.'
      },
      {
        icon: '✅', color: '#22c55e', title: 'Pronto para agir',
        status: 'OK',
        body: 'Pergunta única de alinhamento → depois implemento em módulo isolado seguindo RN-07.'
      }
    ],
    bug: [
      {
        icon: '🧠', color: '#3b82f6', title: 'Ler MEMORY.md e memórias do projeto',
        status: 'Consultando',
        findings: [
          { type: 'ok', text: 'Memória carregada: project_autorelatoriov5.md' },
          { type: 'warn', text: 'RN-01 detectada: Contrato 1565 = EXCLUSIVO SP2' },
          { type: 'warn', text: 'RN-03 detectada: Altura 7cm = exclusivo SP2 (c1565)' },
        ]
      },
      {
        icon: '🔍', color: '#ef4444', title: 'Localizar o bug — grep no codebase',
        status: 'Buscando',
        findings: [
          { type: 'info', text: 'Grep: "altura" | "height" | "1565"' },
          { type: 'act', text: 'Alvo provável: backend/contracts/c1565/ ou ContractEngine' },
          { type: 'warn', text: 'Verificando se módulo do 1565 está isolado (RN-07)' },
        ]
      },
      {
        icon: '🩺', color: '#eab308', title: 'Diagnóstico cirúrgico',
        status: 'Analisando',
        findings: [
          { type: 'warn', text: 'Suspeita: altura hardcoded no builder padrão, não no módulo SP2' },
          { type: 'ok', text: 'Confirmar antes de editar — não refatorar o core (RN-08)' },
        ]
      },
      {
        icon: '💡', color: '#e87c2b', title: 'Decisão de abordagem',
        status: 'Decidindo',
        decisions: ['code:fix', 'memory:RN-03'],
        body: 'Fix cirúrgico apenas no módulo c1565. Nunca tocar no core para acomodar um contrato específico.'
      },
      {
        icon: '✅', color: '#22c55e', title: 'Pronto para agir',
        status: 'OK',
        body: 'Mostro o arquivo e a linha exata antes de editar. Uma mudança, um arquivo.'
      }
    ],
    ask: [
      {
        icon: '🧠', color: '#3b82f6', title: 'Ler MEMORY.md e memórias do projeto',
        status: 'Consultando',
        findings: [
          { type: 'ok', text: 'Memória carregada: forense_autorelatorio_ecossistema.md' },
          { type: 'info', text: 'RN-04: conteudo[] = único contrato de dados scanner↔builder' },
        ]
      },
      {
        icon: '📖', color: '#3b82f6', title: 'Identificar tipo: pergunta técnica',
        status: 'Classificando',
        findings: [
          { type: 'info', text: 'Tipo: EXPLICAÇÃO — não precisa editar código' },
          { type: 'ok', text: 'Thiago: construtor pragmático, prefere resposta direta e técnica' },
          { type: 'act', text: 'Lerei o código real antes de explicar — sem alucinação' },
        ]
      },
      {
        icon: '🔎', color: '#22c55e', title: 'Localizar definição no código',
        status: 'Lendo',
        findings: [
          { type: 'ok', text: 'Grep: "conteudo" em AutoRelatorio_V5/backend/' },
          { type: 'ok', text: 'Lendo scanner.py e builder.py para contexto real' },
        ]
      },
      {
        icon: '✅', color: '#22c55e', title: 'Pronto para responder',
        status: 'OK',
        body: 'Resposta direta, técnica, com referência ao arquivo e linha. Sem rodeios.'
      }
    ],
    sess: [
      {
        icon: '🧠', color: '#3b82f6', title: 'Ler MEMORY.md — estado do projeto',
        status: 'Consultando',
        findings: [
          { type: 'ok', text: 'MEMORY.md carregado — 3 memórias de projeto ativas' },
          { type: 'ok', text: 'project_autorelatoriov5.md — AutoRelatório V5 em desenvolvimento' },
          { type: 'ok', text: 'project_ecossistema_os.md — 5 estágios do Grupo Zap' },
          { type: 'info', text: 'forense_autorelatorio_ecossistema.md — módulos canônicos' },
        ]
      },
      {
        icon: '📋', color: '#a855f7', title: 'Classificar: sessões inacabadas',
        status: 'Classificando',
        findings: [
          { type: 'warn', text: 'Não há TodoList persistente — sessões são contexto de conversa' },
          { type: 'act', text: 'Preciso saber: qual sessão? qual contexto? qual era o objetivo?' },
          { type: 'info', text: 'Posso ler _workspace/logs/ ou _workspace/memoria/ se existir registro' },
        ]
      },
      {
        icon: '❓', color: '#eab308', title: 'Decisão: fazer UMA pergunta',
        status: 'Alinhando',
        decisions: ['ask:clarify'],
        body: 'Regra: nunca fazer múltiplas perguntas de uma vez. Pergunto: "Qual das sessões você quer retomar — AutoRelatório V5, OS do Zap, Preventivas da Caixa, ou outro?"'
      },
      {
        icon: '✅', color: '#22c55e', title: 'Aguardando resposta',
        status: 'OK',
        body: 'Com o contexto da sessão, carrego os detalhes e retomo de onde parou.'
      }
    ]
  };

  let selectedType = null;
  let animating = false;

  function selectExample(btn) {
    document.querySelectorAll('.example-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.type;
    document.getElementById('custom-input').value = '';
    runSimulation();
  }

  function runSimulation() {
    if (animating) return;

    let type = selectedType;
    const custom = document.getElementById('custom-input').value.trim();

    if (custom) {
      type = classifyCustom(custom);
      selectedType = type;
    }

    if (!type) {
      showRight('<div style="color:#555;font-size:13px;padding:8px">Escreva algo ou escolha um exemplo.</div>');
      return;
    }

    const stages = STAGES[type];
    const input = custom || getLabel(type);
    renderStages(stages, input);
  }

  function classifyCustom(text) {
    const t = text.toLowerCase();
    if (t.includes('1565') || t.includes('bug') || t.includes('erro') || t.includes('errado') || t.includes('quebr') || t.includes('não funciona'))
      return 'bug';
    if (t.includes('como') || t.includes('o que') || t.includes('explica') || t.includes('funciona') || t.includes('?'))
      return 'ask';
    if (t.includes('sessão') || t.includes('sessoes') || t.includes('inacabada') || t.includes('continuar') || t.includes('retomar'))
      return 'sess';
    return 'nova';
  }

  function getLabel(type) {
    const map = {
      nova: 'Quero adicionar uma tela de relatório no AutoRelatório V5',
      bug: 'O contrato 1565 está gerando altura 10cm em vez de 7cm',
      ask: 'Como funciona o conteudo[] no scanner?',
      sess: 'Tenho sessões inacabadas, quero continuar'
    };
    return map[type] || '';
  }

  function showRight(html) {
    document.getElementById('right').innerHTML = html;
  }

  async function renderStages(stages, input) {
    animating = true;
    document.getElementById('run-btn').disabled = true;

    const right = document.getElementById('right');
    right.innerHTML = '';

    // Input display
    const inp = document.createElement('div');
    inp.className = 'input-display';
    inp.style.display = 'block';
    inp.textContent = '> ' + input;
    right.appendChild(inp);

    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = 'Processo de inicialização';
    right.appendChild(label);

    const nodes = [];

    for (let i = 0; i < stages.length; i++) {
      const s = stages[i];
      const el = buildStage(s, i === stages.length - 1);
      right.appendChild(el);
      nodes.push(el);
    }

    // Animate each stage sequentially
    for (let i = 0; i < nodes.length; i++) {
      const el = nodes[i];
      const s = stages[i];

      await delay(200);
      el.classList.add('visible', 'active');

      // Update status to running
      const statusEl = el.querySelector('.stage-status');
      statusEl.className = 'stage-status status-run';
      statusEl.innerHTML = `<span class="spinner"></span>${s.status}…`;

      // Show findings one by one
      const findings = el.querySelectorAll('.finding');
      for (const f of findings) {
        await delay(280);
        f.style.opacity = '0';
        f.style.display = 'flex';
        f.style.transition = 'opacity .25s';
        await delay(20);
        f.style.opacity = '1';
      }

      // Show body text if present
      const body = el.querySelector('.stage-body');
      if (body && s.body) {
        await delay(200);
        body.style.display = 'block';
      }

      // Show decisions
      const decs = el.querySelector('.decisions');
      if (decs) {
        await delay(150);
        decs.style.display = 'flex';
      }

      await delay(400);

      // Mark done
      el.classList.remove('active');
      el.classList.add('done');
      statusEl.className = 'stage-status status-done';
      statusEl.textContent = '✓ OK';

      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    animating = false;
    document.getElementById('run-btn').disabled = false;
  }

  function buildStage(s, isLast) {
    const el = document.createElement('div');
    el.className = 'stage';

    const header = document.createElement('div');
    header.className = 'stage-header';

    const icon = document.createElement('div');
    icon.className = 'stage-icon';
    icon.style.background = s.color + '22';
    icon.textContent = s.icon;

    const title = document.createElement('div');
    title.className = 'stage-title';
    title.textContent = s.title;

    const status = document.createElement('div');
    status.className = 'stage-status status-wait';
    status.textContent = 'Aguardando';

    header.appendChild(icon);
    header.appendChild(title);
    header.appendChild(status);
    el.appendChild(header);

    const body = document.createElement('div');
    body.className = 'stage-body';

    if (s.findings) {
      for (const f of s.findings) {
        const fd = document.createElement('div');
        fd.className = `finding ${f.type}`;
        fd.style.display = 'none';
        const dot = document.createElement('span');
        dot.className = 'finding-dot';
        const txt = document.createElement('span');
        txt.textContent = f.text;
        fd.appendChild(dot);
        fd.appendChild(txt);
        body.appendChild(fd);
      }
    }

    if (s.decisions) {
      const decs = document.createElement('div');
      decs.className = 'decisions';
      decs.style.display = 'none';
      decs.style.flexWrap = 'wrap';
      decs.style.gap = '4px';
      decs.style.marginTop = '8px';
      for (const d of s.decisions) {
        const [kind, val] = d.split(':');
        const tag = document.createElement('span');
        tag.className = `decision-tag dt-${kind}`;
        const labels = { skill: '⚡ Skill', code: '💻 Código', memory: '🧠 Memória', ask: '❓ Pergunta', agent: '🤖 Agente' };
        tag.textContent = `${labels[kind] || kind}: ${val}`;
        decs.appendChild(tag);
      }
      body.appendChild(decs);
    }

    if (s.body) {
      const p = document.createElement('p');
      p.style.marginTop = '8px';
      p.style.display = 'none';
      p.style.fontSize = '12px';
      p.style.color = '#aaa';
      p.style.lineHeight = '1.6';
      p.textContent = s.body;
      body.appendChild(p);

      // override the display:none on stage-body for text
      body.querySelector('p') && (body.querySelector('p').style.display = 'none');
    }

    el.appendChild(body);

    if (isLast) {
      const out = document.createElement('div');
      out.className = 'output-box visible';
      out.innerHTML = `<span style="color:#555">// próximo passo</span>\n${s.body || 'Pronto para executar.'}<span class="cursor"></span>`;
      el.appendChild(out);
    }

    return el;
  }

  function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function reset() {
    animating = false;
    selectedType = null;
    document.getElementById('run-btn').disabled = false;
    document.querySelectorAll('.example-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('custom-input').value = '';
    document.getElementById('right').innerHTML =
      '<div class="section-label" style="color:#333">← Escolha um exemplo ou escreva algo</div>';
  }
</script>
</body>
</html>
